<h2>Welcome {{ user }}</h2>
<a href="/logout">Logout</a>

<h3>Upload File</h3>
<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Upload</button>
</form>

<hr>

<h3>Your Files</h3>

{% for file in files %}
    <p>
        {{ file }}
        <a href="/download/{{ file }}">Download</a>
    </p>
{% endfor %}
