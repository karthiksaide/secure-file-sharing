<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FileLite Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f3f7;
}

.header{
background:#6b6dfc;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
max-width:900px;
margin:auto;
}

.upload-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input[type=file]{
margin-bottom:10px;
}

button{
padding:10px 18px;
border:none;
background:#6b6dfc;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5a5cff;
}

.warning{
color:red;
font-size:14px;
}

.preview img{
max-width:200px;
margin-top:10px;
border-radius:6px;
}

.file-list{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.file{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
padding:10px 0;
}

.file:last-child{
border-bottom:none;
}

.actions a{
margin-left:10px;
text-decoration:none;
color:white;
background:#6b6dfc;
padding:6px 10px;
border-radius:5px;
}

.actions a.delete{
background:#e74c3c;
}

</style>
</head>

<body>

<div class="header">
<h2>FileLite Dashboard</h2>
<a href="/logout" style="color:white;text-decoration:none;">Logout</a>
</div>

<div class="container">

<div class="upload-box">

<h3>Upload File</h3>

{% if error %}
<p class="warning">{{ error }}</p>
{% endif %}

<p id="sizeWarning" class="warning"></p>

<form action="/upload" method="POST" enctype="multipart/form-data" onsubmit="return validateFile()">

<input type="file" id="fileInput" name="file" required onchange="previewFile()">

<div id="previewArea" class="preview"></div>

<br>

<button type="submit">Upload</button>

</form>

</div>

<div class="file-list">

<h3>Your Files</h3>

{% for file in files %}

<div class="file">

<span>{{ file.name }}</span>

<div class="actions">

<a href="/download/{{ file.name }}">Download</a>

<a class="delete" href="/delete/{{ file.name }}">Delete</a>

</div>

</div>

{% endfor %}

</div>

</div>

<script>

function validateFile(){

let fileInput=document.getElementById("fileInput");
let sizeWarning=document.getElementById("sizeWarning");

let file=fileInput.files[0];

let maxSize=50*1024*1024;

if(file.size>maxSize){

sizeWarning.innerHTML="File exceeds 50MB limit!";
return false;

}

sizeWarning.innerHTML="";
return true;

}

function previewFile(){

let file=document.getElementById("fileInput").files[0];
let previewArea=document.getElementById("previewArea");

previewArea.innerHTML="";

if(!file) return;

let type=file.type;

if(type.startsWith("image")){

let img=document.createElement("img");
img.src=URL.createObjectURL(file);

previewArea.appendChild(img);

}else{

previewArea.innerHTML="Selected file: "+file.name;

}

}

</script>

</body>
</html>
