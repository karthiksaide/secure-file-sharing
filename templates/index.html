<!DOCTYPE html>
<html>

<head>

<title>FileLite Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f8fafc;
}

.sidebar{
width:220px;
height:100vh;
background:#1e293b;
color:white;
position:fixed;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button{
padding:6px 12px;
margin-left:5px;
}

</style>

<script>

function searchFiles(){

let input=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll(".file");

rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(input)?"":"none";
})

}

</script>

</head>

<body>

<div class="sidebar">

<h2>⬢ FileLite</h2>

<a href="/dashboard">Dashboard</a>
<a href="/help">Help</a>
<a href="/about">About</a>
<a href="/logout">Logout</a>

</div>


<div class="main">

<h2>Welcome {{user}}</h2>

<input id="search" placeholder="Search files..." onkeyup="searchFiles()">

<div class="card">

<h3>Upload File</h3>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file">

<button>Upload</button>

</form>

</div>


<div class="card">

<h3>Your Files</h3>

{% for file in own_files %}

<div class="file">

<b>{{file.filename}}</b>

<br>

<small>Uploaded: {{file.created_at}}</small>

<br>

<a href="/download/{{file.filename}}">Download</a>

<form action="/delete/{{file.filename}}" method="POST" style="display:inline">

<button>Delete</button>

</form>

<form action="/share/{{file.filename}}" method="POST" style="display:inline">

<select name="users" multiple>

{% for u in all_users %}

<option value="{{u}}">{{u}}</option>

{% endfor %}

</select>

<button>Share</button>

</form>

</div>

<hr>

{% endfor %}

</div>


<div class="card">

<h3>Files Shared With You</h3>

{% for f in shared_files %}

<div>

<b>{{f.filename}}</b>

from {{f.owner}}

<a href="/download/{{f.filename}}">Download</a>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
