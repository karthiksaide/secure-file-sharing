<!DOCTYPE html>
<html>

<head>

<title>FileLite Dashboard</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:#f1f5f9;
}

/* Sidebar */

.sidebar{
width:220px;
height:100vh;
background:#1e293b;
color:white;
position:fixed;
padding:25px;
}

.sidebar img{
width:140px;
margin-bottom:25px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
font-size:15px;
}

.sidebar a:hover{
color:#a5b4fc;
}


/* Main area */

.main{
margin-left:240px;
padding:35px;
}

/* Header */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.search{
padding:10px;
width:240px;
border:1px solid #ccc;
border-radius:6px;
}


/* Cards */

.card{
background:white;
padding:22px;
border-radius:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
margin-bottom:25px;
}


/* File list */

.file{
padding:12px;
border-bottom:1px solid #eee;
}

.file:last-child{
border:none;
}

.file b{
font-size:15px;
}

.file small{
color:#64748b;
}

.actions{
margin-top:6px;
}

button{
padding:6px 12px;
margin-right:6px;
border:none;
background:#6366f1;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

select{
padding:5px;
}

</style>

<script>

function searchFiles(){

let input=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll(".file");

rows.forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";
})

}

</script>

</head>

<body>

<div class="sidebar">

<img src="/static/filelite-logo.svg">

<a href="/dashboard">Dashboard</a>
<a href="/help">Help</a>
<a href="/about">About</a>
<a href="/logout">Logout</a>

</div>



<div class="main">

<div class="topbar">

<h2>Welcome {{user}}</h2>

<input
id="search"
class="search"
placeholder="Search files..."
onkeyup="searchFiles()"
>

</div>


<div class="card">

<h3>Upload File</h3>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file">

<button>Upload</button>

</form>

</div>



<div class="card">

<h3>Your Files</h3>

{% for file in own_files %}

<div class="file">

<b>{{file.filename}}</b>

<br>

<small>Uploaded: {{file.created_at}}</small>

<div class="actions">

<a href="/download/{{file.filename}}">
<button>Download</button>
</a>

<form action="/delete/{{file.filename}}" method="POST" style="display:inline">
<button>Delete</button>
</form>

<form action="/share/{{file.filename}}" method="POST" style="display:inline">

<select name="users" multiple>

{% for u in all_users %}

<option value="{{u}}">{{u}}</option>

{% endfor %}

</select>

<button>Share</button>

</form>

</div>

</div>

{% endfor %}

</div>



<div class="card">

<h3>Files Shared With You</h3>

{% for f in shared_files %}

<div class="file">

<b>{{f.filename}}</b>

<br>

<small>Owner: {{f.owner}}</small>

<div class="actions">

<a href="/download/{{f.filename}}">
<button>Download</button>
</a>

</div>

</div>

{% endfor %}

</div>


</div>

</body>
</html>
