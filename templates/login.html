<!DOCTYPE html>
<html>
<head>
<title>FileLite Login</title>
<style>
body{margin:0;font-family:Arial;display:flex;flex-direction:column;min-height:100vh;}
.main{display:flex;flex:1;}
.left-panel{flex:1;background:linear-gradient(135deg,#5f6dfc,#7b5cff);display:flex;justify-content:center;align-items:center;color:white;text-align:center;padding:60px;}
.left-panel h1{font-size:52px;margin-bottom:20px;margin-top:10px;}
.left-panel p{font-size:20px;line-height:1.6;}
.right-panel{flex:1;display:flex;justify-content:center;align-items:center;background:#f3f4f6;}
.card{background:white;padding:35px;width:350px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.card h2{text-align:center;margin-bottom:20px;}
input{width:100%;padding:10px;margin-bottom:15px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box;}
input.error-input{border-color:#e74c3c;}
.show-pass{display:flex;align-items:center;justify-content:flex-start;gap:8px;margin-bottom:15px;font-size:14px;}
.show-pass input[type="checkbox"]{width:auto;margin:0;padding:0;cursor:pointer;}
button{width:100%;padding:12px;background:#6b6dfc;border:none;color:white;font-size:16px;border-radius:6px;cursor:pointer;}
button:hover{background:#5a5cff;}
.link{text-align:center;margin-top:15px;}
.error-box{background:#fff0f0;border:1px solid #f5c6c6;color:#c0392b;padding:10px 14px;border-radius:6px;font-size:14px;margin-bottom:15px;display:flex;align-items:center;gap:8px;}
.footer{background:#f8f8f8;border-top:1px solid #eee;padding:12px 30px;display:flex;justify-content:center;gap:30px;}
.footer a{color:#6b6dfc;text-decoration:none;font-size:14px;}
.footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="main">
<div class="left-panel">
  <div>
    <svg width="120" height="110" viewBox="0 0 120 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="55" rx="42" ry="30" fill="white" opacity="0.95"/>
      <ellipse cx="38" cy="62" rx="22" ry="20" fill="white" opacity="0.95"/>
      <ellipse cx="82" cy="62" rx="22" ry="20" fill="white" opacity="0.95"/>
      <rect x="16" y="62" width="88" height="22" fill="white" opacity="0.95"/>
      <rect x="42" y="32" width="36" height="48" rx="3" fill="#29b6f6"/>
      <polygon points="66,32 78,44 66,44" fill="#0288d1"/>
      <polygon points="66,32 78,32 78,44" fill="#4fc3f7"/>
      <rect x="47" y="52" width="22" height="3" rx="1.5" fill="white" opacity="0.85"/>
      <rect x="47" y="59" width="22" height="3" rx="1.5" fill="white" opacity="0.85"/>
      <rect x="47" y="66" width="15" height="3" rx="1.5" fill="white" opacity="0.85"/>
    </svg>
    <h1>FileLite</h1>
    <p>Secure cloud file sharing platform.<br>Upload, store and share files safely.</p>
  </div>
</div>
<div class="right-panel">
  <div class="card">
    <h2>Login</h2>
    {% if error %}
    <div class="error-box">&#9888; {{ error }}</div>
    {% endif %}
    <form id="loginForm">
      <input type="text" id="username" name="username" placeholder="Username" required
        value="{{ request.form.get('username', '') }}">
      <input type="password" id="password" name="password" placeholder="Password" required>
      <div class="show-pass">
        <label for="showpass">Show password</label>
        <input type="checkbox" id="showpass" onclick="togglePassword()">
      </div>
      <button type="button" id="loginBtn" onclick="handleLogin()">Login</button>
    </form>
    <div class="link">Don't have an account? <a href="/register">Create account</a></div>
  </div>
</div>
</div>
<div class="footer">
  <a href="/about">&#8505; About</a>
  <a href="/about#help">&#10067; Help</a>
  <a href="/about#faq">&#128172; FAQ</a>
  <a href="mailto:karthiksaide19@gmail.com">&#9993; Contact Us</a>
</div>
<script>
function togglePassword(){
  let p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

function b64ToBytes(b64){ return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
function bytesToB64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }

async function deriveKeyFromPassword(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await window.crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return window.crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}

async function handleLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  if (!username || !password) return;

  const btn = document.getElementById("loginBtn");

  // Check if private key already in localStorage (same device)
  const cached = localStorage.getItem(`privkey_${username}`);

  // Submit login first
  btn.textContent = "Logging in...";
  btn.disabled = true;

  const formData = new FormData();
  formData.append("username", username);
  formData.append("password", password);
  const resp = await fetch("/", { method: "POST", body: formData, redirect: "manual" });

  if (resp.status === 200 || resp.type === "opaqueredirect") {
    // If no cached key, fetch and decrypt from server
    if (!cached) {
      try {
        const keyResp = await fetch(`/get_encrypted_private_key/${encodeURIComponent(username)}`);
        if (keyResp.ok) {
          const keyData = await keyResp.json();
          const parts = keyData.encrypted_private_key.split(":");
          if (parts.length === 3) {
            const salt = b64ToBytes(parts[0]);
            const iv = b64ToBytes(parts[1]);
            const encryptedKey = b64ToBytes(parts[2]);
            const aesKey = await deriveKeyFromPassword(password, salt);
            const privKeyBuffer = await window.crypto.subtle.decrypt(
              { name: "AES-GCM", iv }, aesKey, encryptedKey
            );
            localStorage.setItem(`privkey_${username}`, bytesToB64(privKeyBuffer));
          }
        }
      } catch(e) {
        console.log("Key fetch failed:", e);
      }
    }
    window.location.href = "/dashboard";
  } else {
    window.location.href = "/";
  }
}
</script>
</body>
</html>
