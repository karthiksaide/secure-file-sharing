<!DOCTYPE html>
<html>
<head>

<title>FileLite Login</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#6366f1;
border:none;
color:white;
cursor:pointer;
}

</style>

<script>
function togglePassword(){
var p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}
</script>

</head>

<body>

<div class="card">

<h2>⬢ FileLite</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" id="password" name="password" placeholder="Password" required>

<label>
<input type="checkbox" onclick="togglePassword()"> Show Password
</label>

<button type="submit">Login</button>

</form>

<p style="text-align:center">
<a href="/register">Create account</a>
</p>

</div>

</body>
</html>
