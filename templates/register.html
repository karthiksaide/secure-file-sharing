<!DOCTYPE html>
<html>
<head>

<title>Register - FileLite</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#6366f1;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p style="text-align:center">
<a href="/">Back to login</a>
</p>

</div>

</body>
</html>
