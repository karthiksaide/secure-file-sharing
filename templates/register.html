<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FileLite Register</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
}

.left{
flex:1;
background:linear-gradient(135deg,#5f6dfc,#7b5cff);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:40px;
}

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#f2f3f7;
}

.card{
background:white;
padding:35px;
width:350px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

.options{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#6b6dfc;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5a5cff;
}

.link{
text-align:center;
margin-top:15px;
}

.strength{
font-size:13px;
margin-bottom:10px;
}

.error{
color:red;
font-size:14px;
margin-bottom:10px;
text-align:center;
}

.success{
color:green;
font-size:14px;
margin-bottom:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="left">

<div>
<h1>FileLite</h1>
<p>Create an account and start<br>sharing files securely.</p>
</div>

</div>

<div class="right">

<div class="card">

<h2>Create Account</h2>

<div class="error">{{ error }}</div>
<div class="success">{{ message }}</div>

<form action="/register" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" id="password" name="password" placeholder="Password" onkeyup="checkStrength()" required>

<div class="strength" id="strength"></div>

<div class="options">
<input type="checkbox" onclick="togglePassword()">
<label>Show password</label>
</div>

<button type="submit">Register</button>

</form>

<div class="link">
Already have account? <a href="/">Login</a>
</div>

</div>

</div>

<script>

function togglePassword(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

function checkStrength(){
let pass=document.getElementById("password").value;
let strength=document.getElementById("strength");

if(pass.length<6){
strength.innerHTML="Weak password";
strength.style.color="red";
}
else if(pass.length<10){
strength.innerHTML="Medium password";
strength.style.color="orange";
}
else{
strength.innerHTML="Strong password";
strength.style.color="green";
}
}

</script>

</body>
</html>
