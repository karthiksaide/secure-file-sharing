<!DOCTYPE html>
<html>
<head>

<title>Create Account - FileLite</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
display:flex;
height:100vh;
}

.left{
flex:1;
background:linear-gradient(135deg,#6366f1,#4f46e5);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.left h1{
font-size:40px;
margin-bottom:10px;
}

.left p{
font-size:18px;
opacity:0.9;
text-align:center;
max-width:320px;
}

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#f8fafc;
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:170px;
display:block;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-top:12px;
border:1px solid #ccc;
border-radius:6px;
}

.password-row{
display:flex;
align-items:center;
gap:6px;
margin-top:8px;
font-size:14px;
}

button{
width:100%;
padding:11px;
margin-top:18px;
background:#6366f1;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
font-size:15px;
}

button:hover{
background:#4f46e5;
}

.bottom{
text-align:center;
margin-top:18px;
font-size:14px;
}

a{
color:#6366f1;
text-decoration:none;
font-weight:500;
}

</style>

<script>
function togglePassword(){
var p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}
</script>

</head>

<body>

<div class="left">

<h1>Join FileLite</h1>

<p>
Create your account and start sharing files securely in the cloud.
</p>

</div>


<div class="right">

<div class="card">

<div class="logo">
<img src="/static/filelite-logo.svg">
</div>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" id="password" name="password" placeholder="Password" required>

<div class="password-row">
<input type="checkbox" onclick="togglePassword()">
<label>Show password</label>
</div>

<button type="submit">Create Account</button>

</form>

<div class="bottom">
Already have an account?
<a href="/">Back to login</a>
</div>

</div>

</div>

</body>
</html>
