<!DOCTYPE html>
<html>
<head>

<title>Register - FileLite</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
}

input[type=text], input[type=password]{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:4px;
}

.password-row{
display:flex;
align-items:center;
margin-top:8px;
gap:6px;
font-size:14px;
}

button{
width:100%;
padding:10px;
margin-top:18px;
background:#6366f1;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
font-size:15px;
}

button:hover{
background:#4f46e5;
}

.bottom-text{
text-align:center;
margin-top:18px;
font-size:14px;
}

a{
color:#6366f1;
text-decoration:none;
font-weight:500;
}

</style>

<script>
function togglePassword(){
var p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}
</script>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" id="password" name="password" placeholder="Password" required>

<div class="password-row">
<input type="checkbox" onclick="togglePassword()">
<label>Show password</label>
</div>

<button type="submit">Register</button>

</form>

<div class="bottom-text">
Already have an account?
<a href="/">Back to login</a>
</div>

</div>

</body>
</html>
